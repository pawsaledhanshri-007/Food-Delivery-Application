<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodCart Dashboard</title>

<style>
:root{
    --primary:#6c47ff;
    --primary-dark:#5936e0;
    --bg:#f5f3ff;
    --white:#ffffff;
    --text:#2f3542;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background:var(--bg);
    display:flex;
}

/* Sidebar */
.sidebar{
    width:250px;
    background:var(--primary);
    color:white;
    min-height:100vh;
    padding:30px 20px;
}

.sidebar h2{
    margin-bottom:40px;
}

.sidebar button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:white;
    color:var(--primary);
    font-weight:600;
    cursor:pointer;
}

/* Main */
.main{
    flex:1;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(108,71,255,0.1);
    margin-bottom:20px;
}

.card h3{
    margin-bottom:15px;
}

input, button{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:10px;
    width:100%;
}

button{
    background:var(--primary);
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:var(--primary-dark);
}

.section{display:none;}
.active{display:block;}
.order-card{
    background:#faf9ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>FoodCart 🍔</h2>
    <button onclick="logout()">Logout</button>
</div>

<div class="main">
    <div class="topbar">
        <h2 id="welcome"></h2>
    </div>

    <!-- CONSUMER -->
    <div id="consumerSection" class="section">
        <div class="card">
            <h3>Available Restaurants</h3>
            <div id="restaurants"></div>
        </div>
    </div>

    <!-- RESTAURANT -->
    <div id="restaurantSection" class="section">
        <div class="card">
            <h3>Add Food Item</h3>
            <form id="foodForm" enctype="multipart/form-data">
                <input name="name" placeholder="Food Name" required>
                <input name="price" type="number" placeholder="Price" required>
                <input name="gst" type="number" placeholder="GST %" required>
                <input type="file" name="image" required>
                <button>Add Food</button>
            </form>
        </div>

        <div class="card">
            <h3>Your Orders</h3>
            <div id="restaurantOrders"></div>
        </div>
    </div>

    <!-- DRIVER -->
    <div id="driverSection" class="section">
        <div class="card">
            <h3>Assigned Orders</h3>
            <div id="driverOrders"></div>
        </div>
    </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user) location.href="login-signup/login-signup.html";

document.getElementById("welcome").innerText =
"Welcome "+user.username+" ("+user.role+")";

/* SHOW SECTION */
if(user.role==="consumer"){
    document.getElementById("consumerSection").classList.add("active");
    loadRestaurants();
}
if(user.role==="restaurant"){
    document.getElementById("restaurantSection").classList.add("active");
    loadRestaurantOrders();
}
if(user.role==="driver"){
    document.getElementById("driverSection").classList.add("active");
    loadDriverOrders();
}

/* CONSUMER */
async function loadRestaurants(){
    const res = await fetch('/restaurants');
    const data = await res.json();
    const div = document.getElementById("restaurants");
    div.innerHTML="";
    data.forEach(r=>{
        div.innerHTML+=`
        <div class="order-card">
            <strong>${r.username}</strong><br>
            ${r.email}
        </div>`;
    });
}

/* RESTAURANT */
document.getElementById("foodForm")?.addEventListener("submit",async(e)=>{
    e.preventDefault();
    const formData=new FormData(e.target);
    formData.append("restaurant_id",user.id);
    await fetch('/add-food',{method:"POST",body:formData});
    alert("Food Added");
    e.target.reset();
});

async function loadRestaurantOrders(){
    const res=await fetch('/orders/restaurant/'+user.id);
    const data=await res.json();
    const div=document.getElementById("restaurantOrders");
    div.innerHTML="";
    data.forEach(o=>{
        div.innerHTML+=`
        <div class="order-card">
            Order #${o.id} - ₹${o.total} - ${o.status}
            <button onclick="acceptOrder(${o.id})">Accept</button>
        </div>`;
    });
}

async function acceptOrder(id){
    await fetch('/accept-order/'+id,{method:"POST"});
    alert("Driver Assigned");
    location.reload();
}

/* DRIVER */
async function loadDriverOrders(){
    const res=await fetch('/orders/driver/'+user.id);
    const data=await res.json();
    const div=document.getElementById("driverOrders");
    div.innerHTML="";
    data.forEach(o=>{
        div.innerHTML+=`
        <div class="order-card">
            Order #${o.id} - ₹${o.total} - ${o.status}
        </div>`;
    });
}

function logout(){
    localStorage.clear();
    location.href="/login-signup.html";
}
</script>

</body>
</html>
